# GitLab CI/CD for the SeeEvent monorepo (frontend/ + backend/).
# Mirror of the GitHub Actions workflows so the same pipeline runs on both.
#
# Frontend deploy variables (Settings > CI/CD > Variables):
#   VITE_API_BASE_URL   - URL of the deployed backend API
#   NETLIFY_AUTH_TOKEN  - Netlify personal access token (protected, masked)
#   NETLIFY_SITE_ID     - Netlify site API ID
image: node:20

include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - verify
  - build
  - deploy
  - test # SAST template attaches to the `test` stage

# ----- Frontend (frontend/) -----------------------------------------------

fe:verify:
  stage: verify
  cache:
    key: { files: ['frontend/package-lock.json'] }
    paths: ['frontend/.npm/', 'frontend/node_modules/']
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run lint
    - npm run typecheck
    - npm test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ['frontend/**/*']

fe:build:
  stage: build
  cache:
    key: { files: ['frontend/package-lock.json'] }
    paths: ['frontend/.npm/', 'frontend/node_modules/']
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths: ['frontend/build/']
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ['frontend/**/*']

fe:deploy:
  stage: deploy
  needs: ['fe:build']
  script:
    - npm install -g netlify-cli
    - netlify deploy --dir=frontend/build --prod --message "GitLab pipeline $CI_PIPELINE_IID"
  environment:
    name: production
  # Runs only when ENABLE_NETLIFY_DEPLOY=true (and NETLIFY_* vars) are set.
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $ENABLE_NETLIFY_DEPLOY == "true"'
      changes: ['frontend/**/*']

# ----- Backend (backend/) -------------------------------------------------

be:verify:
  stage: verify
  cache:
    key: { files: ['backend/package-lock.json'] }
    paths: ['backend/.npm/', 'backend/node_modules/']
  script:
    - cd backend
    - npm ci --cache .npm --prefer-offline
    - npm run lint
    - npm run typecheck
    - npm test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ['backend/**/*']

be:build:
  stage: build
  cache:
    key: { files: ['backend/package-lock.json'] }
    paths: ['backend/.npm/', 'backend/node_modules/']
  script:
    - cd backend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths: ['backend/dist/']
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ['backend/**/*']
