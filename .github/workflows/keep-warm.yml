name: Keep backend warm

# Render's free tier sleeps after ~15 min idle. This pings the health endpoint
# every 13 minutes so the service stays awake (~24/7) at no cost.
#
# Enable it: set a repo variable RENDER_PING_URL to your Render service URL
# (e.g. https://see-event.onrender.com). Until then the job is skipped.
on:
  schedule:
    - cron: '*/13 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    if: vars.RENDER_PING_URL != ''
    steps:
      - name: Ping /health
        run: |
          echo "Pinging ${{ vars.RENDER_PING_URL }}/health"
          curl -fsS --max-time 60 "${{ vars.RENDER_PING_URL }}/health" || {
            echo "Ping failed (service may be cold-starting)"; exit 0;
          }
